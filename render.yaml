# Render Blueprint. You can also just create a Web Service manually in the Render dashboard.
# NOTE: use the "Starter" instance ($7/mo), not Free — Free instances sleep when idle and
# will cold-start mid-call, which drops the first caller. Starter stays always-on.
services:
  - type: web
    name: leaf-busters-ai
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_REALTIME_MODEL
        value: gpt-4o-realtime-preview-2024-12-17
      - key: OPENAI_VOICE
        value: verse
      - key: OPENAI_SMS_MODEL
        value: gpt-4o-mini
